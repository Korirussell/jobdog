spring:
  application:
    name: backend-api
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:jobdog}
    password: ${SPRING_DATASOURCE_PASSWORD:jobdog}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
      pool-name: jobdog-hikari
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
  flyway:
    enabled: true
    out-of-order: true
    repair-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: profile,email
            redirect-uri: "${APP_OAUTH_REDIRECT_BASE}/api/v1/auth/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:change-me}
            client-secret: ${GITHUB_CLIENT_SECRET:change-me}
            scope: user:email
            redirect-uri: "${APP_OAUTH_REDIRECT_BASE}/api/v1/auth/oauth2/callback/{registrationId}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-env-change-me-in-env}
    expiration: ${APP_JWT_EXPIRATION:PT12H}
  oauth:
    frontend-base-url: ${APP_FRONTEND_BASE_URL}
  cors:
    allowed-origins:
      - ${APP_CORS_ALLOWED_ORIGIN_PROD:https://jobdog.dev}
      - ${APP_CORS_ALLOWED_ORIGIN_WWW:https://www.jobdog.dev}
  r2:
    endpoint: ${APP_R2_ENDPOINT}
    bucket: ${APP_R2_BUCKET:resumes}
    access-key: ${APP_R2_ACCESS_KEY:change-me}
    secret-key: ${APP_R2_SECRET_KEY:change-me}
    region: ${APP_R2_REGION:auto}
  openai:
    api-key: ${APP_OPENAI_API_KEY:change-me}
