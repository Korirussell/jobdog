server {
    listen 80;
    server_name jobdog.dev www.jobdog.dev;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jobdog.dev www.jobdog.dev;

    # SSL configuration (you'll need to set up Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/jobdog.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/jobdog.dev/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API endpoints - proxy to backend
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # OAuth endpoints - proxy to backend
    location /oauth2/ {
        proxy_pass http://localhost:8080;
    }

    location /login/oauth2/ {
        proxy_pass http://localhost:8080;
    }

    # WebSocket endpoint - proxy to backend
    location /ws/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check
    location /actuator/health {
        proxy_pass http://localhost:8080;
    }

    # Frontend - proxy to Vercel or serve static files
    location / {
        # Option 1: Proxy to Vercel frontend
        proxy_pass https://your-vercel-app.vercel.app;
        
        # Option 2: Serve static files if you build frontend locally
        # root /var/www/jobdog/frontend;
        # try_files $uri $uri/ /index.html;
    }
}
